<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Markdown Editor</title>
</head>
<body>
    <div class="general-container">
        <div class="editor-container" id="editor-container">
            <div class="toolbar">
                <button id="export-as-md">Export as .md File</button>
                <button id="import-as-md">Import .md File</button>
                <input type="file" id="import-md" accept=".md,text/markdown,text/plain" hidden>
            </div>
            <h2 id="editor-headline">Editor</h2>
            <textarea id="editor"></textarea>
        </div>
        <div class="preview-container" id="preview-container">
            <h2 id="preview-headline">Preview</h2>
            <div id="preview">

            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
